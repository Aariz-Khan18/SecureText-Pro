<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureText Toolkit | Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: 'var(--background)',
            foreground: 'var(--foreground)',
            card: 'var(--card)',
            border: 'var(--border)',
            primary: '#00ffcc', 
            primaryDark: '#00ccaa'
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen antialiased flex flex-col">

  <header class="border-b card-bg border sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2 font-bold text-xl tracking-tight">
        <i data-lucide="shield-check" style="color: var(--primary);"></i>
        <span>SecureText <span style="color: var(--primary);">Toolkit</span></span>
      </div>
      <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
        <i data-lucide="moon" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8 flex flex-col md:flex-row gap-8">
    
    <nav class="w-full md:w-64 flex flex-row md:flex-col gap-2 overflow-x-auto pb-4 md:pb-0 no-scrollbar">
      <button onclick="switchTab('password')" id="tab-password" class="tab-btn active-tab flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-all shadow-md whitespace-nowrap">
        <i data-lucide="lock" class="w-5 h-5"></i> Password Gen
      </button>
      <button onclick="switchTab('text')" id="tab-text" class="tab-btn inactive-tab flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-all whitespace-nowrap">
        <i data-lucide="type" class="w-5 h-5"></i> Text Utils
      </button>
      <button onclick="switchTab('security')" id="tab-security" class="tab-btn inactive-tab flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-all whitespace-nowrap">
        <i data-lucide="hash" class="w-5 h-5"></i> Security Tools
      </button>
    </nav>

    <section class="flex-1 min-w-0">
      
      <div id="view-password" class="card-bg border rounded-xl p-6 shadow-sm">
        <h2 class="text-2xl font-bold mb-4">Password Generator</h2>
        
        <div class="relative mb-2">
          <input type="text" id="pwdOutput" readonly class="w-full bg-gray-100 dark:bg-gray-800 text-xl font-mono p-4 rounded-lg outline-none pr-24" />
          <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-2">
            <button onclick="generatePassword()" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-md transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5 text-gray-500"></i></button>
            <button onclick="copyToClipboard('pwdOutput')" class="p-2 bg-[var(--primaryDark)] text-white rounded-md transition-colors"><i data-lucide="copy" class="w-5 h-5"></i></button>
          </div>
        </div>
        
        <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full mb-6 overflow-hidden">
            <div id="strengthBar" class="h-full w-0 transition-all duration-300"></div>
        </div>

        <div class="space-y-4">
          <div>
            <div class="flex justify-between mb-2">
              <label class="text-sm font-medium">Length</label>
              <span id="pwdLengthLabel" class="text-sm font-bold" style="color: var(--primaryDark);">16</span>
            </div>
            <input type="range" id="pwdLength" min="4" max="64" value="16" class="w-full" oninput="updateLengthLabel(this.value); generatePassword()" />
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4 border-t border-gray-200 dark:border-gray-700">
            <label class="flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" id="chkUpper" checked onchange="generatePassword()" class="w-4 h-4"> <span class="text-sm">Uppercase (A-Z)</span></label>
            <label class="flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" id="chkLower" checked onchange="generatePassword()" class="w-4 h-4"> <span class="text-sm">Lowercase (a-z)</span></label>
            <label class="flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" id="chkNum" checked onchange="generatePassword()" class="w-4 h-4"> <span class="text-sm">Numbers (0-9)</span></label>
            <label class="flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" id="chkSym" checked onchange="generatePassword()" class="w-4 h-4"> <span class="text-sm">Symbols (!@#$)</span></label>
            <label class="flex items-center gap-2 cursor-pointer select-none sm:col-span-2"><input type="checkbox" id="chkAmb" onchange="generatePassword()" class="w-4 h-4"> <span class="text-sm">Avoid Ambiguous (1, l, O, 0)</span></label>
          </div>
        </div>
      </div>

      <div id="view-text" class="card-bg border rounded-xl p-6 shadow-sm hidden">
        <h2 class="text-2xl font-bold mb-4">Text Utilities & Encoding</h2>
        
        <div class="flex flex-wrap gap-2 mb-4" id="textActions">
          <button onclick="processText('upper')" class="action-btn">UPPERCASE</button>
          <button onclick="processText('lower')" class="action-btn">lowercase</button>
          <button onclick="processText('capitalize')" class="action-btn">Capitalize</button>
          <button onclick="processText('spaces')" class="action-btn">Remove Extra Spaces</button>
          <div class="w-full h-px bg-gray-200 dark:bg-gray-700 my-1"></div> 
          <button onclick="processText('base64enc')" class="action-btn text-blue-500">Base64 Encode</button>
          <button onclick="processText('base64dec')" class="action-btn text-blue-500">Base64 Decode</button>
          <button onclick="processText('urlenc')" class="action-btn text-purple-500">URL Encode</button>
          <button onclick="processText('urldec')" class="action-btn text-purple-500">URL Decode</button>
        </div>

        <textarea id="textInputArea" oninput="updateTextStats()" placeholder="Paste or type your text here..." class="w-full h-64 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-4 outline-none focus:ring-2 focus:ring-primary/50 resize-y font-mono text-sm"></textarea>

        <div class="flex flex-col sm:flex-row justify-between items-center mt-4 gap-4">
          <div class="flex gap-4 text-sm text-gray-500 dark:text-gray-400">
            <span>Words: <b id="wordCount">0</b></span>
            <span>Chars: <b id="charCount">0</b></span>
          </div>
          <div class="flex gap-2">
            <button onclick="document.getElementById('textInputArea').value=''; updateTextStats()" class="flex items-center gap-2 px-4 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-md transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i> Clear</button>
            <button onclick="copyToClipboard('textInputArea')" class="flex items-center gap-2 px-4 py-2 bg-[var(--primaryDark)] text-white rounded-md transition-colors"><i data-lucide="copy" class="w-4 h-4"></i> Copy</button>
          </div>
        </div>
      </div>

      <div id="view-security" class="card-bg border rounded-xl p-6 shadow-sm hidden">
        <h2 class="text-2xl font-bold mb-4">Hash Generator</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Generate cryptographic hashes locally in your browser.</p>
        
        <textarea id="hashInput" oninput="debounceGenerateHashes()" placeholder="Enter text to hash..." class="w-full h-32 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-4 mb-6 outline-none focus:ring-2 focus:ring-primary/50"></textarea>

        <div class="space-y-4">
          <div class="space-y-1">
            <label class="text-sm font-semibold uppercase">SHA-256</label>
            <div class="flex gap-2">
              <input type="text" id="out-sha256" readonly class="flex-1 bg-gray-100 dark:bg-gray-800 font-mono text-sm p-2 rounded-md outline-none" />
              <button onclick="copyToClipboard('out-sha256')" class="p-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-md"><i data-lucide="copy" class="w-4 h-4"></i></button>
            </div>
          </div>
          <div class="space-y-1">
            <label class="text-sm font-semibold uppercase">SHA-512</label>
            <div class="flex gap-2">
              <input type="text" id="out-sha512" readonly class="flex-1 bg-gray-100 dark:bg-gray-800 font-mono text-sm p-2 rounded-md outline-none" />
              <button onclick="copyToClipboard('out-sha512')" class="p-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-md"><i data-lucide="copy" class="w-4 h-4"></i></button>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-[var(--primaryDark)] text-black font-bold px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 pointer-events-none z-50">
      <i data-lucide="check-circle" class="w-5 h-5"></i>
      <span id="toastMsg">Copied!</span>
  </div>

  <footer class="mt-auto py-6 border-t card-bg border transition-colors">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <p class="text-sm text-gray-500 dark:text-gray-400">
        Developed by 
        <a href="https://aariz-khan18.github.io/Easter_Eggs/" target="_blank" rel="noopener noreferrer" class="secret-link font-bold tracking-wide" title="Accessing Secure Server...">Aariz Khan</a>
      </p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
